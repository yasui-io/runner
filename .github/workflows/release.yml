# Release for yasui-io/runner (04 §2/§12):
# npm publish --provenance for @yasui.io/runner-protocol and @yasui.io/runner
# (GitHub Actions OIDC → Sigstore attestations; the updater verifies with
# `npm audit signatures`), plus regeneration of the Node sha256 pins in
# install/runner.sh.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write # npm --provenance (Sigstore via OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: install
        run: bun install --frozen-lockfile
      - name: typecheck + tests
        run: |
          bun run typecheck
          bun --cwd packages/runner-protocol test
          bun --cwd packages/runner test
      - name: build publishable packages
        run: bun run build

      - name: validate tag and package versions
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          PROTOCOL_VERSION="$(node -p "require('./packages/runner-protocol/package.json').version")"
          RUNNER_VERSION="$(node -p "require('./packages/runner/package.json').version")"
          RUNNER_PROTOCOL_VERSION="$(node -p "require('./packages/runner/package.json').dependencies['@yasui.io/runner-protocol']")"
          [ "$VERSION" = "$PROTOCOL_VERSION" ]
          [ "$VERSION" = "$RUNNER_VERSION" ]
          [ "$VERSION" = "$RUNNER_PROTOCOL_VERSION" ]

      - name: pin-node-hashes — regenerate runner.sh sha256 pins
        run: |
          set -eu
          NODE_VERSION="$(grep '^NODE_VERSION=' install/runner.sh | cut -d'"' -f2)"
          SHASUMS="$(curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/SHASUMS256.txt")"
          pin() { echo "$SHASUMS" | grep " node-${NODE_VERSION}-$1.tar.gz\$" | cut -d' ' -f1; }
          sed -i \
            -e "s|__RELEASE_YML_PIN_DARWIN_ARM64__|$(pin darwin-arm64)|" \
            -e "s|__RELEASE_YML_PIN_DARWIN_X64__|$(pin darwin-x64)|" \
            -e "s|__RELEASE_YML_PIN_LINUX_ARM64__|$(pin linux-arm64)|" \
            -e "s|__RELEASE_YML_PIN_LINUX_X64__|$(pin linux-x64)|" \
            install/runner.sh
          grep -q "__RELEASE_YML_PIN" install/runner.sh && { echo "pin substitution failed" >&2; exit 1; } || true

      - name: publish @yasui.io/runner-protocol
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@yasui.io/runner-protocol@$VERSION" version >/dev/null 2>&1; then
            echo "@yasui.io/runner-protocol@$VERSION is already published; skipping"
          else
            npm publish --provenance --access public
          fi
        working-directory: packages/runner-protocol
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: publish @yasui.io/runner
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if npm view "@yasui.io/runner@$VERSION" version >/dev/null 2>&1; then
            echo "@yasui.io/runner@$VERSION is already published; skipping"
          else
            npm publish --provenance --access public
          fi
        working-directory: packages/runner
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: attach runner.sh (with pins) to the release
        uses: softprops/action-gh-release@v2
        with:
          files: install/runner.sh
      # apps/web vendors install/runner.sh from this release artifact and
      # serves it at https://yasui.io/runner.sh (04 §4).
